<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Master - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050914; color: #fff; padding: 20px; }

        /* Login Screen */
        #admin-login { max-width: 400px; margin: 100px auto; background: #0f172a; padding: 30px; border-radius: 12px; border: 1px solid #ff4d4d; text-align: center; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2); }
        .admin-title { color: #ff4d4d; font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; background: #050914; border: 1px solid #2d4a77; border-radius: 8px; color: #fff; outline: none; }
        .btn-login { width: 100%; padding: 15px; background: #ff4d4d; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Dashboard Screen */
        #admin-dashboard { display: none; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1f365c; padding-bottom: 15px; }
        .header h1 { color: #ff4d4d; font-size: 22px; text-transform: uppercase; }
        .btn-logout { background: #1f365c; color: #fff; padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #2d4a77; color: #8898aa; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #ff4d4d; color: #fff; border-color: #ff4d4d; }

        /* Request Cards */
        .req-list { display: flex; flex-direction: column; gap: 15px; }
        .req-card { background: #0f172a; border: 1px solid #1f365c; border-left: 4px solid #ffaa00; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .req-info p { margin-bottom: 5px; font-size: 13px; color: #cbd5e1; }
        .req-info span { color: #00e6ff; font-weight: bold; }
        .req-amount { font-size: 20px; font-weight: 900; color: #00ff88; margin-bottom: 10px; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-approve { background: #00ff88; color: #000; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-reject { background: #ff4d4d; color: #fff; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .no-data { text-align: center; color: #8898aa; padding: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div id="admin-login">
        <h2 class="admin-title">Master Control</h2>
        <input type="text" id="admin-id" class="input-box" placeholder="Admin ID">
        <input type="password" id="admin-pass" class="input-box" placeholder="Password">
        <button class="btn-login" onclick="loginAdmin()">ENTER SYSTEM</button>
        <p id="error-msg" style="color: #ff4d4d; margin-top: 15px; display: none; font-size: 13px;">Invalid ID or Password!</p>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h1>LNT Master Panel</h1>
            <button class="btn-logout" onclick="logoutAdmin()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('deposits')">Pending Deposits</button>
            <button class="tab-btn" onclick="switchTab('withdrawals')">Pending Withdrawals</button>
        </div>

        <div id="deposits-view" class="req-list"></div>
        <div id="withdrawals-view" class="req-list" style="display: none;"></div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Admin Security Check
        function loginAdmin() {
            let id = document.getElementById('admin-id').value;
            let pass = document.getElementById('admin-pass').value;

            if(id === "3603236032" && pass === "J1a2y3a4") {
                document.getElementById('admin-login').style.display = "none";
                document.getElementById('admin-dashboard').style.display = "block";
                loadRequests();
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }

        function logoutAdmin() {
            document.getElementById('admin-login').style.display = "block";
            document.getElementById('admin-dashboard').style.display = "none";
            document.getElementById('admin-id').value = "";
            document.getElementById('admin-pass').value = "";
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if(tab === 'deposits') {
                document.getElementById('deposits-view').style.display = "flex";
                document.getElementById('withdrawals-view').style.display = "none";
            } else {
                document.getElementById('deposits-view').style.display = "none";
                document.getElementById('withdrawals-view').style.display = "flex";
            }
        }

        function loadRequests() {
            // Load Deposits
            db.ref('depositRequests').on('value', snap => {
                let data = snap.val();
                let html = "";
                if(data) {
                    for(let key in data) {
                        if(data[key].status === 'Pending') {
                            html += `
                            <div class="req-card">
                                <div class="req-info">
                                    <p>User: <span>${data[key].phone}</span></p>
                                    <p>UTR: <span>${data[key].utr}</span></p>
                                    <p>Date: ${data[key].date}</p>
                                    <div class="req-amount">₹${data[key].amount}</div>
                                </div>
                                <div class="action-btns">
                                    <button class="btn-approve" onclick="approveDeposit('${key}', '${data[key].phone}', ${data[key].amount})">Approve</button>
                                </div>
                            </div>`;
                        }
                    }
                }
                document.getElementById('deposits-view').innerHTML = html || "<div class='no-data'>No pending deposits.</div>";
            });

            // Load Withdrawals
            db.ref('withdrawRequests').on('value', snap => {
                let data = snap.val();
                let html = "";
                if(data) {
                    for(let key in data) {
                        if(data[key].status === 'Pending') {
                            html += `
                            <div class="req-card" style="border-left-color: #00e6ff;">
                                <div class="req-info">
                                    <p>User: <span>${data[key].phone}</span></p>
                                    <p>Bank: ${data[key].bankName} | A/C: <span>${data[key].accountNo}</span></p>
                                    <p>IFSC: <span>${data[key].ifsc}</span></p>
                                    <div class="req-amount" style="color: #00e6ff;">₹${data[key].amount}</div>
                                </div>
                                <div class="action-btns">
                                    <button class="btn-approve" onclick="approveWithdraw('${key}', '${data[key].phone}')">Paid</button>
                                </div>
                            </div>`;
                        }
                    }
                }
                document.getElementById('withdrawals-view').innerHTML = html || "<div class='no-data'>No pending withdrawals.</div>";
            });
        }

        // --- ACTION FUNCTIONS ---
        function approveDeposit(reqId, phone, amount) {
            if(confirm(`Add ₹${amount} to user ${phone}?`)) {
                db.ref('users/' + phone).once('value').then(snap => {
                    let currentBal = snap.val().balance || 0;
                    // Update user balance
                    db.ref('users/' + phone).update({ balance: currentBal + amount });
                    // Update request status
                    db.ref('depositRequests/' + reqId).update({ status: 'Approved' });
                    // Add to user history
                    db.ref('users/' + phone + '/transactions').push({ type: 'Deposit Approved', amount: amount, status: 'Success', date: new Date().toLocaleString() });
                });
            }
        }

        function approveWithdraw(reqId, phone) {
            if(confirm(`Did you send money to ${phone}'s bank account?`)) {
                // Update request status
                db.ref('withdrawRequests/' + reqId).update({ status: 'Approved' });
                // Add to user history
                db.ref('users/' + phone + '/transactions').push({ type: 'Withdrawal Approved', amount: 0, status: 'Success (Paid)', date: new Date().toLocaleString() });
            }
        }
    </script>
</body>
</html>
