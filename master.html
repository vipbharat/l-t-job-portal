<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&T Master - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #050914; color: #fff; padding: 20px; padding-bottom: 50px; }

        /* Login Screen */
        #admin-login { max-width: 400px; margin: 100px auto; background: #0f172a; padding: 30px; border-radius: 12px; border: 1px solid #ff4d4d; text-align: center; }
        .admin-title { color: #ff4d4d; font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .input-box { width: 100%; padding: 15px; margin-bottom: 15px; background: #050914; border: 1px solid #2d4a77; border-radius: 8px; color: #fff; outline: none; }
        .btn-login { width: 100%; padding: 15px; background: #ff4d4d; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Dashboard Screen */
        #admin-dashboard { display: none; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1f365c; padding-bottom: 15px; }
        .header h1 { color: #ff4d4d; font-size: 22px; text-transform: uppercase; }
        .btn-logout { background: #1f365c; color: #fff; padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }

        /* Scrollable Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; padding: 12px 20px; background: #0f172a; border: 1px solid #2d4a77; color: #8898aa; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap;}
        .tab-btn.active { background: #ff4d4d; color: #fff; border-color: #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }

        /* Request & User Cards */
        .req-list { display: flex; flex-direction: column; gap: 15px; }
        .req-card { background: #0f172a; border: 1px solid #1f365c; border-left: 4px solid #ffaa00; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .req-info p { margin-bottom: 5px; font-size: 13px; color: #cbd5e1; }
        .req-info span { color: #00e6ff; font-weight: bold; }
        .req-amount { font-size: 20px; font-weight: 900; color: #00ff88; margin-bottom: 10px; }
        
        .btn-action { background: #00ff88; color: #000; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-view { background: #00e6ff; color: #000; padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Broadcast Form */
        .broadcast-form { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #00e6ff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #8898aa; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .form-group select, .form-group textarea, .form-group input { width: 100%; padding: 12px; background: #050914; border: 1px solid #2d4a77; border-radius: 8px; color: #fff; outline: none; }
        .form-group textarea { height: 100px; resize: none; }
        .btn-send { width: 100%; padding: 15px; background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); color: #000; font-weight: 900; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        /* Search Box for Players */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #00e6ff; border-radius: 8px; color: #fff; outline: none; }
        .search-box button { padding: 12px 20px; background: #00e6ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .no-data { text-align: center; color: #8898aa; padding: 40px; font-style: italic; }

        /* KUNDLI MODAL (Popup) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0f172a; width: 100%; max-width: 400px; border-radius: 12px; border: 1px solid #ffaa00; box-shadow: 0 10px 30px rgba(255, 170, 0, 0.2); overflow: hidden; }
        .modal-header { background: #1f365c; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d4a77; }
        .modal-header h3 { color: #ffaa00; margin: 0; font-size: 16px; text-transform: uppercase; }
        .close-btn { background: transparent; color: #fff; border: none; font-size: 20px; cursor: pointer; }
        .modal-body { padding: 20px; }
        
        .k-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed #1f365c; padding-bottom: 8px; }
        .k-row:last-child { border-bottom: none; }
        .k-label { color: #8898aa; font-size: 13px; font-weight: bold; }
        .k-val { color: #fff; font-size: 14px; font-weight: bold; text-align: right; }
        .k-val.highlight { color: #00ff88; }
        .k-val.alert { color: #ff4d4d; }

    </style>
</head>
<body>

    <div id="admin-login">
        <h2 class="admin-title">Master Control</h2>
        <input type="text" id="admin-id" class="input-box" placeholder="Admin ID">
        <input type="password" id="admin-pass" class="input-box" placeholder="Password">
        <button class="btn-login" onclick="loginAdmin()">ENTER SYSTEM</button>
        <p id="error-msg" style="color: #ff4d4d; margin-top: 15px; display: none; font-size: 13px;">Invalid Credentials!</p>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h1>L&T Master Panel</h1>
            <button class="btn-logout" onclick="logoutAdmin()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('deposits')">💳 Deposits</button>
            <button class="tab-btn" onclick="switchTab('withdrawals')">🏦 Withdraws</button>
            <button class="tab-btn" onclick="switchTab('broadcast')">📢 Broadcast</button>
            <button class="tab-btn" onclick="switchTab('players')">👥 Players (Kundli)</button>
        </div>

        <div id="deposits-view" class="req-list"></div>
        
        <div id="withdrawals-view" class="req-list" style="display: none;"></div>
        
        <div id="broadcast-view" class="broadcast-form" style="display: none;">
            <h3 style="color: #00e6ff; margin-bottom: 15px;">Send Message to Channel</h3>
            <div class="form-group"><label>Sender Identity</label><select id="msg-sender"><option value="office">🏢 L&T Head Office</option><option value="finance">💳 L&T Finance Dept</option><option value="hr">👩‍💼 Priya - Sr. HR Manager</option></select></div>
            <div class="form-group"><label>Message Text</label><textarea id="msg-text" placeholder="Type message..."></textarea></div>
            <button class="btn-send" onclick="sendBroadcast()">🚀 Send to All Users</button>
        </div>

        <div id="players-view" style="display: none;">
            <div class="search-box">
                <input type="number" id="search-phone" placeholder="Enter Mobile Number to search...">
                <button onclick="renderUsers()">🔍 Search</button>
            </div>
            <div id="users-list" class="req-list">
                </div>
        </div>
    </div>

    <div id="kundli-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📜 Player Kundli</h3>
                <button class="close-btn" onclick="closeModal()">✖</button>
            </div>
            <div class="modal-body" id="kundli-details">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM", databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allUsersData = {}; // Saare users ka data yahan aayega

        function loginAdmin() {
            if(document.getElementById('admin-id').value === "3603236032" && document.getElementById('admin-pass').value === "J1a2y3a4") {
                document.getElementById('admin-login').style.display = "none";
                document.getElementById('admin-dashboard').style.display = "block";
                loadRequests();
                loadUsers(); // Load all users secretly in background
            } else { document.getElementById('error-msg').style.display = "block"; }
        }

        function logoutAdmin() { location.reload(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('deposits-view').style.display = tab === 'deposits' ? "flex" : "none";
            document.getElementById('withdrawals-view').style.display = tab === 'withdrawals' ? "flex" : "none";
            document.getElementById('broadcast-view').style.display = tab === 'broadcast' ? "block" : "none";
            document.getElementById('players-view').style.display = tab === 'players' ? "block" : "none";
        }

        // --- FETCH ALL USERS ---
        function loadUsers() {
            db.ref('users').on('value', snap => {
                allUsersData = snap.val() || {};
                renderUsers(); // Update list if tab is open
            });
        }

        // --- SHOW USERS (With Search Logic) ---
        function renderUsers() {
            let container = document.getElementById('users-list');
            let searchQuery = document.getElementById('search-phone').value.trim();
            let html = "";

            for(let phone in allUsersData) {
                // Agar search box mein kuch likha hai, toh sirf matching number dikhao
                if(searchQuery !== "" && !phone.includes(searchQuery)) continue;

                let u = allUsersData[phone];
                let currentPlan = u.level || "FREE";
                
                html += `
                <div class="req-card" style="border-left-color: #00e6ff;">
                    <div class="req-info">
                        <p>Mobile: <span>${phone}</span></p>
                        <p>Plan: <span style="color:#ffaa00;">Project ${currentPlan}</span></p>
                        <div class="req-amount" style="font-size:16px;">Bal: ₹${u.balance || 0}</div>
                    </div>
                    <button class="btn-view" onclick="openKundli('${phone}')">👁️ VIEW</button>
                </div>`;
            }

            container.innerHTML = html || "<div class='no-data'>No players found!</div>";
        }

        // --- OPEN KUNDLI (Popup Details) ---
        function openKundli(phone) {
            let u = allUsersData[phone];
            if(!u) return;

            let bankHtml = "<span style='color:#8898aa'>Not Added Yet</span>";
            if(u.bankDetails) {
                bankHtml = `
                    Bank: ${u.bankDetails.bankName || 'N/A'}<br>
                    A/C: <span style="color:#fff;">${u.bankDetails.accountNo || 'N/A'}</span><br>
                    IFSC: ${u.bankDetails.ifsc || 'N/A'}<br>
                    Name: ${u.bankDetails.holderName || 'N/A'}
                `;
            }

            let html = `
                <div class="k-row"><span class="k-label">Mobile Number:</span><span class="k-val">${phone}</span></div>
                <div class="k-row"><span class="k-label">Login Password:</span><span class="k-val alert">${u.password || 'N/A'}</span></div>
                <div class="k-row"><span class="k-label">Wallet Balance:</span><span class="k-val highlight">₹${u.balance || 0}</span></div>
                <div class="k-row"><span class="k-label">Active Project:</span><span class="k-val" style="color:#ffaa00;">Project ${u.level || 'FREE'}</span></div>
                <div class="k-row"><span class="k-label">Plan Duration:</span><span class="k-val">${u.planDays ? u.planDays + " Days" : 'None'}</span></div>
                <div class="k-row"><span class="k-label">Daily Income:</span><span class="k-val highlight">₹${u.dailyIncome || 0}</span></div>
                <div class="k-row"><span class="k-label">Join Date:</span><span class="k-val">${u.joinDate || 'N/A'}</span></div>
                <div style="margin-top: 15px; background: #050914; padding: 10px; border-radius: 8px; border: 1px dashed #2d4a77;">
                    <span class="k-label" style="display:block; margin-bottom:5px; color:#00e6ff;">🏦 Bank Details:</span>
                    <div style="font-size: 13px; color: #cbd5e1; line-height: 1.6;">${bankHtml}</div>
                </div>
            `;

            document.getElementById('kundli-details').innerHTML = html;
            document.getElementById('kundli-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('kundli-modal').style.display = 'none'; }

        // --- OLD REQUEST LOGIC ---
        function loadRequests() {
            db.ref('depositRequests').on('value', snap => {
                let html = ""; snap.forEach(child => { let d = child.val(); if(d.status === 'Pending') html += `<div class="req-card"><div><p>User: <span>${d.phone}</span></p><p>UTR: ${d.utr}</p><div class="req-amount">₹${d.amount}</div></div><button class="btn-action" onclick="approveDeposit('${child.key}', '${d.phone}', ${d.amount})">Approve</button></div>`; });
                document.getElementById('deposits-view').innerHTML = html || "<div class='no-data'>No pending deposits.</div>";
            });
            db.ref('withdrawRequests').on('value', snap => {
                let html = ""; snap.forEach(child => { let d = child.val(); if(d.status === 'Pending') html += `<div class="req-card" style="border-left-color:#ff4d4d;"><div><p>User: <span>${d.phone}</span></p><p>A/C: ${d.accountNo}</p><div class="req-amount" style="color:#ff4d4d;">₹${d.amount}</div></div><button class="btn-action" onclick="approveWithdraw('${child.key}', '${d.phone}')">Paid</button></div>`; });
                document.getElementById('withdrawals-view').innerHTML = html || "<div class='no-data'>No pending withdrawals.</div>";
            });
        }

        function approveDeposit(reqId, phone, amount) { if(confirm("Approve?")) { db.ref('users/'+phone).once('value').then(s => { db.ref('users/'+phone).update({balance: (s.val().balance||0)+amount}); db.ref('depositRequests/'+reqId).update({status:'Approved'}); }); } }
        function approveWithdraw(reqId, phone) { if(confirm("Paid?")) db.ref('withdrawRequests/'+reqId).update({status:'Approved'}); }
        function sendBroadcast() { alert("Broadcast function active. Data pushes to Firebase channelMessages node."); }
    </script>
</body>
</html>
