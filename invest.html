<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT - Upgrade VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px;
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        
        .bal-box { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; padding: 10px 15px; border-radius: 8px; font-weight: bold; color: #00ff88; }

        .vip-card {
            background: #152238; border: 1px solid #2d4a77; border-radius: 12px; padding: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .vip-card:hover { border-color: #00e6ff; box-shadow: 0 5px 15px rgba(0, 230, 255, 0.1); }
        
        .vip-info h3 { color: #00e6ff; font-size: 22px; margin-bottom: 5px; }
        .vip-price { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .vip-gift { font-size: 12px; color: #ffaa00; font-weight: bold; background: rgba(255, 170, 0, 0.1); padding: 3px 8px; border-radius: 4px; display: inline-block; }

        .btn-buy {
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; border: none; padding: 10px 20px; border-radius: 8px;
            font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase;
        }
        .btn-buy:active { transform: scale(0.95); }
        .btn-buy:disabled { background: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅ Back</a>
            <div class="bal-box" id="user-bal">Bal: ₹0</div>
        </div>

        <h2 style="margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #00e6ff; display: inline-block;">Premium VIP Plans</h2>

        <div id="plans-container">
            <div class="vip-card">
                <div class="vip-info">
                    <h3>Level G2</h3>
                    <div class="vip-price">₹1,450</div>
                    <div class="vip-gift">🎁 Get 1 FREE G2 Spin!</div>
                </div>
                <button class="btn-buy" onclick="buyPlan('G2', 1450)">BUY NOW</button>
            </div>

            <div class="vip-card">
                <div class="vip-info">
                    <h3>Level G3</h3>
                    <div class="vip-price">₹4,200</div>
                    <div class="vip-gift">🎁 Get 1 FREE G3 Spin!</div>
                </div>
                <button class="btn-buy" onclick="buyPlan('G3', 4200)">BUY NOW</button>
            </div>
            
            <div class="vip-card">
                <div class="vip-info">
                    <h3>Level G4</h3>
                    <div class="vip-price">₹12,000</div>
                    <div class="vip-gift">🎁 Get 1 FREE G4 Spin!</div>
                </div>
                <button class="btn-buy" onclick="buyPlan('G4', 12000)">BUY NOW</button>
            </div>
            
            <div class="vip-card">
                <div class="vip-info">
                    <h3>Level G5</h3>
                    <div class="vip-price">₹22,000</div>
                    <div class="vip-gift">🎁 Get 1 FREE G5 Spin!</div>
                </div>
                <button class="btn-buy" onclick="buyPlan('G5', 22000)">BUY NOW</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "login.html";

        let userData = null;

        // Live Balance Fetch karna
        db.ref('users/' + userPhone).on('value', (snap) => {
            userData = snap.val();
            if (userData) {
                document.getElementById('user-bal').innerText = "Bal: ₹" + (userData.balance || 0);
            }
        });

        function buyPlan(planLevel, price) {
            if (!userData) return;

            let currentBal = userData.balance || 0;

            if (currentBal < price) {
                alert(`❌ Aapke paas ₹${price} nahi hain!\nKripya pehle recharge (Deposit) karein.`);
                window.location.href = "deposit.html"; // Recharge page par bhej do
                return;
            }

            let confirmBuy = confirm(`Kya aap sach mein ${planLevel} plan ₹${price} mein khareedna chahte hain?\n\nIski kharid par aapko 1 FREE ${planLevel} SPIN milega!`);
            if (!confirmBuy) return;

            // 1. Balance cut karna aur Level update karna
            let newBalance = currentBal - price;
            
            // 2. Us level ka 1 Spin add karna
            let currentSpins = (userData.spins && userData.spins[planLevel]) ? userData.spins[planLevel] : 0;
            let newSpinCount = currentSpins + 1;

            let updates = {};
            updates['users/' + userPhone + '/balance'] = newBalance;
            updates['users/' + userPhone + '/level'] = planLevel; // VIP Level Update
            updates['users/' + userPhone + '/spins/' + planLevel] = newSpinCount; // Spin Add

            db.ref().update(updates).then(() => {
                // 3. History me "Plan Buy" ki entry daalna (Red color / Kharcha)
                db.ref('users/' + userPhone + '/transactions').push({
                    type: `Bought VIP ${planLevel}`,
                    amount: price,
                    status: 'Success',
                    date: new Date().toLocaleString()
                }).then(() => {
                    alert(`✅ Badhai Ho!\n\nAap ab VIP ${planLevel} ban gaye hain!\n🎁 Aapko 1 FREE ${planLevel} SPIN mila hai. Abhi jakar ghumayein!`);
                    window.location.href = "spin.html"; // Seedha Spin page par bhej do
                });
            });
        }
    </script>
</body>
</html>
