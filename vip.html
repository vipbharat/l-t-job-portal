<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - VIP Tasks</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; background: #152238; padding: 15px 20px; border-radius: 12px; border: 1px solid #1f365c; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0, 200, 255, 0.05); }
        .logo-text { color: #00e6ff; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .wallet-info { text-align: right; }
        .wallet-info p { color: #8898aa; font-size: 12px; text-transform: uppercase; }
        .wallet-info h3 { color: #00ff88; font-size: 18px; }

        .page-title { color: #cbd5e1; font-size: 18px; margin-bottom: 15px; border-left: 4px solid #00e6ff; padding-left: 10px; }

        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }

        .job-card {
            background: #0f172a; border: 1px solid #2d4a77; border-radius: 12px; padding: 20px 15px;
            text-align: center; transition: 0.3s; position: relative; overflow: hidden;
        }
        
        .job-name { color: #8898aa; font-size: 16px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .job-price { color: #00e6ff; font-size: 24px; font-weight: 900; margin-bottom: 15px; }
        
        .apply-btn {
            width: 100%; padding: 10px; border-radius: 6px; border: none;
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; font-weight: bold; font-size: 14px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        
        /* State for unlocked jobs */
        .btn-unlocked { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; cursor: not-allowed; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">LNT JOB</div>
        <div class="wallet-info">
            <p>My Balance</p>
            <h3 id="user-balance">₹0.00</h3> 
        </div>
    </div>

    <div style="max-width: 800px; margin: 0 auto;">
        <h2 class="page-title">Available VIP Jobs</h2>
        
        <div class="job-grid">
            
            <div class="job-card" id="card-G1">
                <div class="job-name">Level G1</div>
                <div class="job-price">₹499</div>
                <button class="apply-btn" id="btn-G1" onclick="buyJob('G1', 499)">Unlock</button>
            </div>

            <div class="job-card" id="card-G2">
                <div class="job-name">Level G2</div>
                <div class="job-price">₹1,450</div>
                <button class="apply-btn" id="btn-G2" onclick="buyJob('G2', 1450)">Unlock</button>
            </div>

            <div class="job-card" id="card-G3">
                <div class="job-name">Level G3</div>
                <div class="job-price">₹4,200</div>
                <button class="apply-btn" id="btn-G3" onclick="buyJob('G3', 4200)">Unlock</button>
            </div>

            <div class="job-card" id="card-G4">
                <div class="job-name">Level G4</div>
                <div class="job-price">₹12,000</div>
                <button class="apply-btn" id="btn-G4" onclick="buyJob('G4', 12000)">Unlock</button>
            </div>

            <div class="job-card" id="card-G5">
                <div class="job-name">Level G5</div>
                <div class="job-price">₹22,000</div>
                <button class="apply-btn" id="btn-G5" onclick="buyJob('G5', 22000)">Unlock</button>
            </div>

            <div class="job-card" id="card-G6">
                <div class="job-name">Level G6</div>
                <div class="job-price">₹4,00,000</div>
                <button class="apply-btn" id="btn-G6" onclick="buyJob('G6', 400000)">Unlock</button>
            </div>

            <div class="job-card" id="card-G7">
                <div class="job-name">Level G7</div>
                <div class="job-price">₹7,50,000</div>
                <button class="apply-btn" id="btn-G7" onclick="buyJob('G7', 750000)">Unlock</button>
            </div>

            <div class="job-card" id="card-G8">
                <div class="job-name">Level G8</div>
                <div class="job-price">₹14,00,000</div>
                <button class="apply-btn" id="btn-G8" onclick="buyJob('G8', 1400000)">Unlock</button>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="job.html" class="nav-item active">🚀 Jobs</a>
        <a href="wallet.html" class="nav-item">💼 Wallet</a>
        <a href="profile.html" class="nav-item">👤 Profile</a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Security: Get logged-in user
        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "login.html";

        let userData = null;

        // Live Balance & Level Fetch
        db.ref('users/' + userPhone).on('value', (snap) => {
            userData = snap.val();
            if (userData) {
                document.getElementById('user-balance').innerText = "₹" + (userData.balance || 0);
                
                // Jo level khareed liya hai, uska button disable kar do
                let currentLevel = userData.level || "G1";
                if(currentLevel) {
                    let btn = document.getElementById('btn-' + currentLevel);
                    let card = document.getElementById('card-' + currentLevel);
                    if(btn) {
                        btn.innerText = "Active ✅";
                        btn.classList.add('btn-unlocked');
                        btn.disabled = true;
                        card.style.borderColor = "#00ff88"; // Green border for active job
                    }
                }
            }
        });

        // Function jab user "Unlock" par click karega
        function buyJob(jobLevel, price) {
            // Hum seedha yahan se invest page par redirect kar rahe hain
            // aur URL mein data bhej rahe hain taaki wahan pata chale kya kharidna hai
            window.location.href = `invest.html?job=${jobLevel}&price=${price}`;
        }
    </script>
</body>
</html>
