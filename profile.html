<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - My Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px;
        }

        /* Top Profile Banner */
        .profile-banner {
            background: linear-gradient(135deg, #152238 0%, #1f365c 100%);
            padding: 30px 20px; border-radius: 16px; border: 1px solid #00e6ff;
            text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0, 230, 255, 0.1);
            position: relative; overflow: hidden;
        }

        .avatar { 
            width: 70px; height: 70px; background: linear-gradient(135deg, #007bff, #00e6ff); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 35px; margin: 0 auto 10px auto; border: 3px solid #090e17;
        }

        .user-phone { font-size: 20px; font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; }
        .vip-badge { display: inline-block; background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #00ff88; margin-bottom: 15px; }
        
        .bal-row { display: flex; justify-content: space-around; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px dashed #2d4a77; }
        .bal-box p { color: #8898aa; font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .bal-box h3 { color: #00e6ff; font-size: 18px; }

        /* Menu List */
        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        
        .menu-item {
            background: #0f172a; border: 1px solid #1f365c; border-radius: 12px; padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between; text-decoration: none; transition: 0.3s;
        }
        .menu-item:hover { border-color: #00e6ff; background: #152238; transform: translateX(5px); }
        
        .menu-left { display: flex; align-items: center; gap: 15px; }
        .menu-icon { font-size: 20px; }
        .menu-text { color: #cbd5e1; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .menu-arrow { color: #8898aa; font-size: 14px; }

        .btn-logout { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ff4d4d; 
            background: rgba(255, 77, 77, 0.1); color: #ff4d4d; font-weight: 900; font-size: 15px; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-logout:active { transform: scale(0.98); background: #ff4d4d; color: #fff; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        
        <div class="profile-banner">
            <div class="avatar">👤</div>
            <div class="user-phone" id="user-display">Loading...</div>
            <div class="vip-badge" id="level-display">G1</div>
            
            <div class="bal-row">
                <div class="bal-box">
                    <p>Wallet Balance</p>
                    <h3 id="balance-display" style="color:#00ff88;">₹0</h3>
                </div>
                <div class="bal-box">
                    <p>Today's Income</p>
                    <h3 id="today-income">₹0</h3>
                </div>
            </div>
        </div>

        <div class="menu-list">
            <a href="bank.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">🏦</span><span class="menu-text">Bind Bank Card</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="history.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">📜</span><span class="menu-text">Financial History</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="team.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">👥</span><span class="menu-text">My Team Data</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="reset.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">🛡️</span><span class="menu-text">Security Center</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="download.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">📥</span><span class="menu-text">Download App</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="about.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">🏢</span><span class="menu-text">About Company</span></div>
                <span class="menu-arrow">➡</span>
            </a>
            <a href="channel.html" class="menu-item">
                <div class="menu-left"><span class="menu-icon">🎧</span><span class="menu-text">Help Center</span></div>
                <span class="menu-arrow">➡</span>
            </a>
        </div>

        <button class="btn-logout" onclick="logoutUser()">Log Out Securely</button>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div>
            Home
        </a>
        <a href="job.html" class="nav-item">
            <div class="nav-icon">🚀</div>
            Jobs
        </a>
        <a href="refer.html" class="nav-item">
            <div class="nav-icon">🔗</div>
            Team
        </a>
        <a href="profile.html" class="nav-item active">
            <div class="nav-icon">👤</div>
            Profile
        </a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Check Login
        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "index.html";

        // Mask phone number (e.g., 98****4321)
        let maskedPhone = userPhone.substring(0, 2) + "******" + userPhone.substring(8, 10);
        document.getElementById('user-display').innerText = "+91 " + maskedPhone;

        // Fetch Live Data
        db.ref('users/' + userPhone).on('value', (snap) => {
            let userData = snap.val();
            if(userData) {
                document.getElementById('balance-display').innerText = "₹" + (userData.balance || 0).toLocaleString('en-IN');
                document.getElementById('level-display').innerText = "VIP " + (userData.level || "G1");
                
                // Agar aaj task kiya hai toh income dikhao
                let today = new Date().toLocaleDateString();
                if(userData.lastTaskDate === today) {
                    // Ye levelRewards job.html wale jaisa hona chahiye
                    let rewards = { "G1": 15, "G2": 50, "G3": 150, "G4": 450, "G5": 850, "G6": 2000, "G7": 4000, "G8": 8000 };
                    document.getElementById('today-income').innerText = "+₹" + (rewards[userData.level || "G1"]);
                }
            }
        });

        function logoutUser() {
            if(confirm("Are you sure you want to log out?")) {
                localStorage.removeItem('loggedInUser');
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
