<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - User Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px;
        }

        /* Top Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px 0; border-bottom: 1px solid #1f365c; margin-bottom: 20px; }
        .top-bar h2 { color: #00e6ff; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .logout-btn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; }

        /* Profile Info Card */
        .profile-card { background: #152238; padding: 20px; border-radius: 12px; border: 1px solid #2d4a77; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0, 230, 255, 0.05); }
        .avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #007bff 0%, #00e6ff 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #000; }
        .user-details h3 { color: #fff; font-size: 18px; margin-bottom: 5px; }
        .user-details p { color: #8898aa; font-size: 14px; }

        /* Wallet Sync Card */
        .wallet-sync { background: linear-gradient(135deg, #0f172a 0%, #1a2a44 100%); padding: 20px; border-radius: 12px; border: 1px dashed #00e6ff; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .wallet-sync div p { color: #8898aa; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .wallet-sync div h2 { color: #00ff88; font-size: 24px; }
        .btn-withdraw { background: #00e6ff; color: #000; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* Bank Binding Form */
        .section-title { color: #cbd5e1; font-size: 16px; margin-bottom: 15px; border-left: 4px solid #00e6ff; padding-left: 10px; text-transform: uppercase; }
        .form-card { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #1f365c; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #a0aec0; font-size: 13px; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d4a77; background: #152238; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #00e6ff; box-shadow: 0 0 10px rgba(0, 230, 255, 0.2); }

        .btn-save { width: 100%; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); color: #000; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { box-shadow: 0 5px 15px rgba(0, 230, 255, 0.4); transform: translateY(-2px); }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: 0 auto;">
        
        <div class="top-bar">
            <h2>MY PROFILE</h2>
            <a href="index.html" class="logout-btn">LOGOUT</a>
        </div>

        <div class="profile-card">
            <div class="avatar">👤</div>
            <div class="user-details">
                <h3>LNT Member</h3>
                <p id="user-phone">+91 98765 43210</p>
            </div>
        </div>

        <div class="wallet-sync">
            <div>
                <p>Available Wallet Balance</p>
                <h2 id="profile-balance">₹0.00</h2>
            </div>
            <a href="wallet.html" class="btn-withdraw">Withdraw ➡</a>
        </div>

        <h3 class="section-title">Bind Bank Account</h3>
        <div class="form-card">
            <p style="color: #ffaa00; font-size: 12px; margin-bottom: 15px;">* Please enter correct details. Withdrawals will be sent to this account only.</p>
            
            <div class="input-group">
                <label>Actual Name (As per Bank)</label>
                <input type="text" id="bank-name" placeholder="Enter Full Name">
            </div>
            <div class="input-group">
                <label>Bank Account Number</label>
                <input type="number" id="bank-acc" placeholder="Enter Account Number">
            </div>
            <div class="input-group">
                <label>IFSC Code</label>
                <input type="text" id="bank-ifsc" placeholder="e.g. SBIN0001234">
            </div>
            <div class="input-group">
                <label>UPI ID (Optional)</label>
                <input type="text" id="bank-upi" placeholder="e.g. 9876543210@ybl">
            </div>

            <button class="btn-save" onclick="saveBankDetails()">SAVE DETAILS</button>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="job.html" class="nav-item">🚀 Jobs</a>
        <a href="wallet.html" class="nav-item">💼 Wallet</a>
        <a href="profile.html" class="nav-item active">👤 Profile</a>
    </div>

    <script>
        // Check if details are already saved in LocalStorage (Simulation of Database)
        window.onload = function() {
            if(localStorage.getItem("bankAcc")) {
                document.getElementById('bank-name').value = localStorage.getItem("bankName");
                document.getElementById('bank-acc').value = localStorage.getItem("bankAcc");
                document.getElementById('bank-ifsc').value = localStorage.getItem("bankIFSC");
                document.getElementById('bank-upi').value = localStorage.getItem("bankUPI");
                
                // Change button text if already saved
                document.querySelector('.btn-save').innerText = "UPDATE DETAILS";
            }
        }

        function saveBankDetails() {
            let name = document.getElementById('bank-name').value;
            let acc = document.getElementById('bank-acc').value;
            let ifsc = document.getElementById('bank-ifsc').value;
            let upi = document.getElementById('bank-upi').value;

            if(name === "" || acc === "" || ifsc === "") {
                alert("Please fill all required bank details.");
                return;
            }

            // Save locally so Wallet page can check it later
            localStorage.setItem("bankName", name);
            localStorage.setItem("bankAcc", acc);
            localStorage.setItem("bankIFSC", ifsc);
            localStorage.setItem("bankUPI", upi);

            alert("Bank Details Saved Successfully!\nNow you can withdraw your wallet balance.");
            document.querySelector('.btn-save').innerText = "UPDATE DETAILS";
        }
    </script>
</body>
</html>
