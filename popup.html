<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Latest Announcements</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        /* Base Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Modal Box Design */
        .modal-box {
            background: #152238; width: 90%; max-width: 380px;
            border-radius: 16px; border: 2px solid #00e6ff;
            position: relative; overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 230, 255, 0.2);
            text-align: center; padding-bottom: 25px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 
            from { transform: scale(0.8); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }

        /* Close Button (X) */
        .close-btn {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255, 77, 77, 0.15); color: #ff4d4d;
            border: 1px solid #ff4d4d; width: 35px; height: 35px;
            border-radius: 50%; font-size: 18px; font-weight: bold;
            cursor: pointer; z-index: 10; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { background: #ff4d4d; color: #fff; transform: rotate(90deg); }

        /* Slider System */
        .slide { display: none; padding: 25px 20px 0 20px; animation: slideFade 0.4s ease-in-out; }
        .slide.active { display: block; }
        @keyframes slideFade { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .slide img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px dashed #2d4a77; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .slide h3 { color: #00e6ff; font-size: 20px; margin-bottom: 8px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .slide p { color: #cbd5e1; font-size: 14px; line-height: 1.5; }

        /* Dots Navigation */
        .slider-dots { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .dot { width: 12px; height: 12px; background: #2d4a77; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: #00e6ff; box-shadow: 0 0 12px #00e6ff; transform: scale(1.3); }

        /* Proceed Button */
        .btn-enter {
            margin-top: 20px; padding: 10px 30px; border-radius: 8px; border: 1px solid #00e6ff;
            background: transparent; color: #00e6ff; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-enter:hover { background: #00e6ff; color: #000; }
    </style>
</head>
<body>

    <div class="modal-box">
        <button class="close-btn" onclick="goToDashboard()">✖</button>

        <div id="slider-container">
            <p style="color:#8898aa; margin-top:50px;">Loading announcements...</p>
        </div>

        <div class="slider-dots" id="dots-container">
            </div>

        <button class="btn-enter" onclick="goToDashboard()">Enter Dashboard</button>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentSlide = 1;
        let slideInterval;
        let totalSlides = 0;

        function goToDashboard() {
            window.location.href = "dashboard.html";
        }

        // Fetch Live Announcements from Admin
        db.ref('settings/announcements').on('value', (snap) => {
            const data = snap.val();
            
            if (data && data.length > 0) {
                totalSlides = data.length;
                let slidesHTML = "";
                let dotsHTML = "";

                data.forEach((item, index) => {
                    let slideNo = index + 1;
                    let isActive = (slideNo === 1) ? "active" : "";
                    
                    slidesHTML += `
                    <div class="slide ${isActive}" id="slide-${slideNo}">
                        <img src="${item.image || 'https://via.placeholder.com/350x160/090e17/00e6ff?text=LNT+News'}" alt="Promo">
                        <h3>${item.title || 'Notification'}</h3>
                        <p>${item.desc || 'Loading...'}</p>
                    </div>`;

                    dotsHTML += `<div class="dot ${isActive}" onclick="showSlide(${slideNo})"></div>`;
                });

                document.getElementById('slider-container').innerHTML = slidesHTML;
                document.getElementById('dots-container').innerHTML = dotsHTML;
                
                resetTimer(); // Restart animation
            } else {
                // Default if no data found
                document.getElementById('slider-container').innerHTML = `
                <div class="slide active">
                    <img src="https://via.placeholder.com/350x160/090e17/00e6ff?text=Welcome+to+LNT" alt="Promo">
                    <h3>Welcome to LNT</h3>
                    <p>Join VIP Jobs today and start earning daily profit directly to your bank account.</p>
                </div>`;
            }
        });

        // Slider Control Logic
        function showSlide(index) {
            if(totalSlides === 0) return;
            
            document.querySelectorAll('.slide').forEach(slide => slide.classList.remove('active'));
            document.querySelectorAll('.dot').forEach(dot => dot.classList.remove('active'));

            let slideElem = document.getElementById('slide-' + index);
            if(slideElem) {
                slideElem.classList.add('active');
                document.querySelectorAll('.dot')[index - 1].classList.add('active');
                currentSlide = index;
            }
            resetTimer();
        }

        function nextSlide() {
            if(totalSlides <= 1) return;
            currentSlide++;
            if(currentSlide > totalSlides) currentSlide = 1;
            showSlide(currentSlide);
        }

        function startTimer() {
            if(totalSlides > 1) {
                slideInterval = setInterval(nextSlide, 3000); // 3 seconds per slide
            }
        }

        function resetTimer() {
            clearInterval(slideInterval);
            startTimer();
        }
    </script>
</body>
</html>
