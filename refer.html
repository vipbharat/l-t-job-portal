<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Change Password</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header { width: 100%; max-width: 400px; display: flex; align-items: center; margin-bottom: 30px; position: absolute; top: 20px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 15px; }

        .security-card {
            background: #152238; width: 100%; max-width: 400px;
            padding: 40px 25px; border-radius: 16px; border: 1px solid #00e6ff;
            box-shadow: 0 10px 30px rgba(0, 230, 255, 0.1);
            text-align: center; margin-top: 50px;
        }

        .icon-lock { font-size: 50px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0, 230, 255, 0.5); }
        .page-title { color: #fff; font-size: 22px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .page-sub { color: #8898aa; font-size: 13px; font-weight: bold; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 14px; background: #090e17; border: 1px solid #2d4a77; 
            border-radius: 8px; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #00e6ff; box-shadow: 0 0 10px rgba(0, 230, 255, 0.2); }

        .btn-update { 
            width: 100%; padding: 15px; border-radius: 8px; border: none; 
            background: linear-gradient(90deg, #ff4d4d 0%, #ff1a1a 100%); 
            color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3);
        }
        .btn-update:active { transform: scale(0.98); }

        #error-msg { color: #ffaa00; font-size: 13px; margin-bottom: 15px; font-weight: bold; display: none; }
        #success-msg { color: #00ff88; font-size: 13px; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn">⬅ Back</a>
    </div>

    <div class="security-card">
        <div class="icon-lock">🛡️</div>
        <h2 class="page-title">Security Center</h2>
        <p class="page-sub">Update your account password</p>

        <p id="error-msg">Error message goes here</p>
        <p id="success-msg">Success message goes here</p>

        <div class="input-group">
            <label>Registered Phone Number</label>
            <input type="number" id="phone" placeholder="Enter your 10 digit number">
        </div>

        <div class="input-group">
            <label>Current Password</label>
            <input type="password" id="old-pass" placeholder="Enter old password">
        </div>

        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="new-pass" placeholder="Enter new password (min 4 chars)">
        </div>

        <button class="btn-update" id="update-btn" onclick="updatePassword()">UPDATE PASSWORD</button>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMessage(type, msg) {
            let errBox = document.getElementById('error-msg');
            let sucBox = document.getElementById('success-msg');
            
            errBox.style.display = 'none';
            sucBox.style.display = 'none';

            if(type === 'error') {
                errBox.innerText = "⚠️ " + msg;
                errBox.style.display = 'block';
            } else {
                sucBox.innerText = "✅ " + msg;
                sucBox.style.display = 'block';
            }
        }

        function updatePassword() {
            let phone = document.getElementById('phone').value.trim();
            let oldPass = document.getElementById('old-pass').value.trim();
            let newPass = document.getElementById('new-pass').value.trim();
            let btn = document.getElementById('update-btn');

            if(phone.length !== 10) {
                showMessage('error', "Enter valid 10-digit number.");
                return;
            }
            if(oldPass === "" || newPass.length < 4) {
                showMessage('error', "New password must be at least 4 characters.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            let userRef = db.ref('users/' + phone);

            userRef.once('value').then((snap) => {
                let userData = snap.val();

                if(userData) {
                    // Check if old password matches
                    if(userData.password === oldPass) {
                        
                        // Update with new password
                        userRef.update({ password: newPass }).then(() => {
                            showMessage('success', "Password updated successfully!");
                            btn.innerText = "PASSWORD UPDATED";
                            btn.style.background = "linear-gradient(90deg, #00ff88 0%, #00b359 100%)";
                            
                            // 2 seconds baad login page pe bhej do taaki naye password se login kare
                            setTimeout(() => {
                                localStorage.removeItem('loggedInUser');
                                window.location.href = "index.html";
                            }, 2000);
                        });

                    } else {
                        showMessage('error', "Incorrect current password!");
                        btn.disabled = false;
                        btn.innerText = "UPDATE PASSWORD";
                    }
                } else {
                    showMessage('error', "Account not found!");
                    btn.disabled = false;
                    btn.innerText = "UPDATE PASSWORD";
                }
            }).catch((error) => {
                showMessage('error', "Network error. Try again.");
                btn.disabled = false;
                btn.innerText = "UPDATE PASSWORD";
            });
        }
    </script>
</body>
</html>
