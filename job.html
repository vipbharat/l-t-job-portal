<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px;
        }

        /* Header Section */
        .header { display: flex; justify-content: space-between; align-items: center; background: #152238; padding: 15px 20px; border-radius: 12px; border: 1px solid #1f365c; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0, 200, 255, 0.05); }
        .logo-text { color: #00e6ff; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .wallet-info { text-align: right; }
        .wallet-info p { color: #8898aa; font-size: 12px; text-transform: uppercase; }
        .wallet-info h3 { color: #fff; font-size: 18px; }

        .page-title { color: #cbd5e1; font-size: 18px; margin-bottom: 15px; border-left: 4px solid #00e6ff; padding-left: 10px; }

        /* Job Cards Grid */
        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }

        .job-card {
            background: #0f172a; border: 1px solid #2d4a77; border-radius: 12px; padding: 20px 15px;
            text-align: center; transition: 0.3s; position: relative; overflow: hidden;
        }
        .job-card:hover { border-color: #00e6ff; box-shadow: 0 10px 20px rgba(0, 230, 255, 0.15); transform: translateY(-5px); }
        
        /* Card Content */
        .job-name { color: #8898aa; font-size: 16px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .job-price { color: #00e6ff; font-size: 24px; font-weight: 900; margin-bottom: 15px; }
        
        /* Action Button */
        .apply-btn {
            width: 100%; padding: 10px; border-radius: 6px; border: none;
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; font-weight: bold; font-size: 14px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .apply-btn:hover { box-shadow: 0 0 10px rgba(0, 230, 255, 0.5); color: #fff; }

        /* Navigation Bar (Bottom) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">LNT JOB</div>
        <div class="wallet-info">
            <p>My Balance</p>
            <h3 id="user-balance">₹0.00</h3>
        </div>
    </div>

    <div style="max-width: 800px; margin: 0 auto;">
        <h2 class="page-title">Available Tasks / Jobs</h2>
        
        <div class="job-grid">
            
            <div class="job-card">
                <div class="job-name">Level G1</div>
                <div class="job-price">₹499</div>
                <button class="apply-btn" onclick="applyJob('G1', 499)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G2</div>
                <div class="job-price">₹1,450</div>
                <button class="apply-btn" onclick="applyJob('G2', 1450)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G3</div>
                <div class="job-price">₹4,200</div>
                <button class="apply-btn" onclick="applyJob('G3', 4200)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G4</div>
                <div class="job-price">₹12,000</div>
                <button class="apply-btn" onclick="applyJob('G4', 12000)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G5</div>
                <div class="job-price">₹22,000</div>
                <button class="apply-btn" onclick="applyJob('G5', 22000)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G6</div>
                <div class="job-price">₹4,00,000</div>
                <button class="apply-btn" onclick="applyJob('G6', 400000)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G7</div>
                <div class="job-price">₹7,50,000</div>
                <button class="apply-btn" onclick="applyJob('G7', 750000)">Unlock</button>
            </div>

            <div class="job-card">
                <div class="job-name">Level G8</div>
                <div class="job-price">₹14,00,000</div>
                <button class="apply-btn" onclick="applyJob('G8', 1400000)">Unlock</button>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">🏠 Home</a>
        <a href="wallet.html" class="nav-item">💼 Wallet</a>
        <a href="#" class="nav-item">👤 Profile</a>
    </div>

    <script>
        // Dummy balance for testing (Real app will get this from Firebase)
        let currentBalance = 0; 
        document.getElementById('user-balance').innerText = "₹" + currentBalance;

        function applyJob(jobName, price) {
            if(currentBalance >= price) {
                alert("Congratulations! You have successfully unlocked Job " + jobName + ".");
                // Yahan se balance katega
                currentBalance -= price;
                document.getElementById('user-balance').innerText = "₹" + currentBalance;
            } else {
                let shortcut = confirm("Insufficient Balance! You need ₹" + price + " to unlock " + jobName + ".\n\nDo you want to Deposit now?");
                if(shortcut) {
                    // Agar paise kam hain, toh user ko seedha wallet wale page par bhej dega
                    window.location.href = "wallet.html";
                }
            }
        }
    </script>
</body>
</html>
