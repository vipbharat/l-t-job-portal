<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Daily VIP Tasks</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px;
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #1f365c; padding-bottom: 15px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .page-title { font-size: 18px; text-transform: uppercase; color: #fff; font-weight: 900; letter-spacing: 1px;}
        .vip-badge { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }

        .task-card {
            background: #152238; border: 1px solid #00e6ff; border-radius: 12px;
            padding: 30px 20px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 230, 255, 0.1); position: relative; overflow: hidden;
        }
        
        .task-img { font-size: 60px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 230, 255, 0.5); }
        .task-title { font-size: 16px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; text-transform: uppercase; }
        .task-reward { font-size: 32px; font-weight: 900; color: #00ff88; margin-bottom: 25px; letter-spacing: 1px; }

        .btn-submit { 
            width: 100%; max-width: 300px; padding: 16px; border-radius: 8px; border: none; 
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); 
            color: #000; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.95); }
        .btn-disabled { background: #2d4a77; color: #8898aa; cursor: not-allowed; box-shadow: none; }

        .info-box { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed #2d4a77; text-align: center; }
        .info-box p { color: #8898aa; font-size: 13px; line-height: 1.5; font-weight: bold; }
        .info-box span { color: #00e6ff; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅ Back</a>
            <h2 class="page-title">Work Station</h2>
            <div class="vip-badge" id="user-level">G1</div>
        </div>

        <div class="task-card">
            <div class="task-img">📱</div>
            <div class="task-title">Daily App Optimization Task</div>
            <div class="task-reward" id="reward-amount">₹0</div>

            <button class="btn-submit btn-disabled" id="task-btn" onclick="submitTask()" disabled>LOADING TASK...</button>
        </div>

        <div class="info-box">
            <p>Your daily income depends on your VIP Level.<br>Upgrade to <span>Level G2 or higher</span> in the VIP section to earn more everyday!</p>
            <br>
            <a href="vip.html" style="color: #00ff88; font-size: 14px; font-weight: bold; text-decoration: none;">💎 View VIP Plans</a>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div>
            Home
        </a>
        <a href="job.html" class="nav-item active">
            <div class="nav-icon">🚀</div>
            Jobs
        </a>
        <a href="refer.html" class="nav-item">
            <div class="nav-icon">🔗</div>
            Team
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            Profile
        </a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "login.html";

        // Admin Rewards Setting (Daily Income based on Level)
        const levelRewards = {
            "G1": 15,
            "G2": 50,
            "G3": 150,
            "G4": 450,
            "G5": 850,
            "G6": 2000,
            "G7": 4000,
            "G8": 8000
        };

        let userData = null;
        let todayDate = new Date().toLocaleDateString(); // Get current date (e.g., 17/03/2026)
        let currentLevel = "G1";
        let dailyReward = 15;

        // Fetch User Data
        db.ref('users/' + userPhone).on('value', (snap) => {
            userData = snap.val();
            if(userData) {
                currentLevel = userData.level || "G1";
                dailyReward = levelRewards[currentLevel] || 15;

                document.getElementById('user-level').innerText = currentLevel;
                document.getElementById('reward-amount').innerText = "₹" + dailyReward;

                checkTaskStatus();
            }
        });

        function checkTaskStatus() {
            let btn = document.getElementById('task-btn');
            
            // Check if user already completed the task today
            if(userData.lastTaskDate === todayDate) {
                btn.innerText = "TASK COMPLETED ✅";
                btn.classList.add('btn-disabled');
                btn.disabled = true;
                document.querySelector('.task-img').innerText = "🎉";
            } else {
                btn.innerText = "START WORK & CLAIM";
                btn.classList.remove('btn-disabled');
                btn.disabled = false;
                document.querySelector('.task-img').innerText = "📱";
            }
        }

        function submitTask() {
            let btn = document.getElementById('task-btn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            // Simulate a fake loading time (2 seconds) to make it feel like real work
            setTimeout(() => {
                let newBalance = (userData.balance || 0) + dailyReward;
                let txnDateStr = new Date().toLocaleString();

                // 1. Update Balance and Date in Firebase
                db.ref('users/' + userPhone).update({
                    balance: newBalance,
                    lastTaskDate: todayDate
                }).then(() => {
                    // 2. Add to History
                    db.ref('users/' + userPhone + '/transactions').push({
                        type: 'Daily Task Income (' + currentLevel + ')',
                        amount: dailyReward,
                        status: 'Success',
                        date: txnDateStr
                    }).then(() => {
                        alert(`✅ Task Successful!\n\n₹${dailyReward} has been added to your wallet.\nCome back tomorrow for your next task!`);
                        checkTaskStatus(); // Update UI to "Completed"
                    });
                });
            }, 2000);
        }
    </script>
</body>
</html>
