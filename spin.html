<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - VIP Spin Rewards</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px; text-align: center;
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .page-title { color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        .status-box { background: rgba(0, 230, 255, 0.05); border: 1px dashed #00e6ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .status-box p { color: #8898aa; font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .status-box h2 { color: #00ff88; font-size: 24px; }

        /* Locked Select Box */
        .level-select { width: 100%; max-width: 300px; padding: 12px; background: #0f172a; color: #00ff88; border: 1px solid #00ff88; border-radius: 8px; font-size: 14px; font-weight: bold; outline: none; margin-bottom: 30px; cursor: not-allowed; text-align: center; appearance: none; }
        
        .spinner-container { position: relative; width: 220px; height: 220px; margin: 0 auto 30px auto; }
        .spinner-ring { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 8px solid #152238; border-top-color: #00e6ff; border-right-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 230, 255, 0.2);
            transition: all 0.1s;
        }

        .spinning-active { animation: spin 0.2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .spinner-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 160px; background: #090e17; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px #000;
        }
        .spinner-center p { color: #8898aa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;}
        .prize-display { color: #fff; font-size: 28px; font-weight: 900; }

        .btn-spin { width: 100%; max-width: 300px; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); color: #000; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 20px rgba(0, 230, 255, 0.3); }
        .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { background: #2d4a77; color: #8898aa; box-shadow: none; cursor: not-allowed; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅ Back</a>
            <div class="page-title">VIP REWARD SPIN</div>
            <a href="history.html" class="back-btn" style="border-color:#00ff88; color:#00ff88;">History</a>
        </div>

        <div class="status-box">
            <p>Available VIP Spins</p>
            <h2 id="spin-count">0</h2>
        </div>

        <select id="level-select" class="level-select" disabled>
            <option value="G1">Level G1 (Reward: ₹50 - ₹500)</option>
            <option value="G2">Level G2 (Reward: ₹300 - ₹1,500)</option>
            <option value="G3">Level G3 (Reward: ₹1,000 - ₹4,500)</option>
            <option value="G4">Level G4 (Reward: ₹3,000 - ₹15,000)</option>
            <option value="G5">Level G5 (Reward: ₹8,000 - ₹25,000)</option>
            <option value="G6">Level G6 (Reward: ₹50,000 - ₹4,00,000)</option>
            <option value="G7">Level G7 (Reward: ₹1,00,000 - ₹8,00,000)</option>
            <option value="G8">Level G8 (Reward: ₹2,00,000 - ₹15,00,000)</option>
        </select>

        <div class="spinner-container">
            <div class="spinner-ring" id="ring"></div>
            <div class="spinner-center">
                <p>Est. Reward</p>
                <div class="prize-display" id="prize-text">₹???</div>
            </div>
        </div>

        <button class="btn-spin" id="spin-btn" onclick="startSpin()" disabled>LOADING...</button>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="invest.html" class="nav-item">📈 Invest</a>
        <a href="spin.html" class="nav-item active">🎡 Spin</a>
        <a href="profile.html" class="nav-item">👤 Profile</a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "login.html";

        let userData = null;
        let userCurrentLevel = "G1";

        // Har level ke dikhane wale fake rewards (Niklega hamesha minimum ke paas hi)
        const spinRewards = {
            "G1": { min: 50, max: 500 },
            "G2": { min: 300, max: 1500 },
            "G3": { min: 1000, max: 4500 },
            "G4": { min: 3000, max: 15000 },
            "G5": { min: 8000, max: 25000 },
            "G6": { min: 50000, max: 400000 },
            "G7": { min: 100000, max: 800000 },
            "G8": { min: 200000, max: 1500000 }
        };

        // Live Data Fetch Karna
        db.ref('users/' + userPhone).on('value', (snap) => {
            userData = snap.val();
            if (userData) {
                userCurrentLevel = userData.level || "G1"; // Database se user ka asli level uthao
                
                // Dropdown ko user ke level par set karke LOCK kar do
                document.getElementById('level-select').value = userCurrentLevel;
                
                updateUI(); 
            }
        });

        function updateUI() {
            if (!userData) return;
            
            // User ke paas uske level ke kitne spin baaki hain?
            let count = (userData.spins && userData.spins[userCurrentLevel]) ? userData.spins[userCurrentLevel] : 0;
            
            document.getElementById('spin-count').innerText = count;
            document.getElementById('prize-text').innerText = "₹???";
            document.getElementById('ring').classList.remove('spinning-active');
            
            let btn = document.getElementById('spin-btn');
            if(count > 0) {
                btn.disabled = false;
                btn.innerText = "SPIN NOW";
            } else {
                btn.disabled = true;
                btn.innerText = "NO SPINS LEFT";
            }
        }

        function startSpin() {
            let currentSpins = (userData.spins && userData.spins[userCurrentLevel]) ? userData.spins[userCurrentLevel] : 0;
            if(currentSpins <= 0) return; 

            let btn = document.getElementById('spin-btn');
            let ring = document.getElementById('ring');
            let prizeText = document.getElementById('prize-text');
            
            btn.disabled = true;
            btn.innerText = "SPINNING...";
            ring.classList.add('spinning-active');

            let min = spinRewards[userCurrentLevel].min;
            let max = spinRewards[userCurrentLevel].max;
            
            // Dhoka: Ghumte time bade numbers dikhao
            let interval = setInterval(() => {
                let randomTemp = Math.floor(Math.random() * (max - min + 1)) + min;
                prizeText.innerText = "₹" + randomTemp.toLocaleString('en-IN');
            }, 60);

            // 3 Second baad wheel rokna aur "SABSE KAM" wala amount dena
            setTimeout(() => {
                clearInterval(interval); 
                ring.classList.remove('spinning-active'); 
                
                // ADMIN TRICK: Hamesha Min + 3% to 8% ke beech niklega
                let trickLimit = min + Math.floor((max - min) * 0.08); 
                let finalWin = Math.floor(Math.random() * (trickLimit - min + 1)) + min;
                
                prizeText.innerText = "₹" + finalWin.toLocaleString('en-IN');
                prizeText.style.color = "#00ff88"; 

                // 1. Balance badhao aur 1 spin kam karo
                let newBalance = (userData.balance || 0) + finalWin;
                let remainingSpins = currentSpins - 1;

                let updates = {};
                updates['users/' + userPhone + '/balance'] = newBalance;
                updates['users/' + userPhone + '/spins/' + userCurrentLevel] = remainingSpins;

                db.ref().update(updates).then(() => {
                    // 2. History me mast "Spin Reward" record daalna
                    db.ref('users/' + userPhone + '/transactions').push({
                        type: `Spin Reward (${userCurrentLevel})`,
                        amount: finalWin,
                        status: 'Success',
                        date: new Date().toLocaleString()
                    }).then(() => {
                        setTimeout(() => {
                            alert(`Bhai Waah! 🎉\n\nAapne ₹${finalWin} jeete hain!\nYe amount aapke Wallet aur History mein add ho gaya hai.`);
                            prizeText.style.color = "#fff"; 
                            updateUI(); 
                        }, 500);
                    });
                });

            }, 3000); 
        }
    </script>
</body>
</html>
