<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Lucky Spin</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px; overflow-x: hidden;
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #1f365c; padding-bottom: 15px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .page-title { font-size: 18px; text-transform: uppercase; color: #fff; font-weight: 900; letter-spacing: 1px;}
        
        .spin-count { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }

        .spin-container {
            background: #152238; border: 1px solid #00e6ff; border-radius: 16px;
            padding: 40px 20px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 230, 255, 0.15); display: flex; flex-direction: column; align-items: center;
        }

        /* Digital Spinner UI (Mobile Optimized) */
        .digital-spinner {
            width: 200px; height: 100px; background: #090e17; border: 3px solid #00e6ff;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; color: #ffaa00; margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 230, 255, 0.2), 0 0 15px rgba(255, 170, 0, 0.3);
            position: relative; overflow: hidden; letter-spacing: 2px;
        }

        .digital-spinner::before {
            content: 'PRIZE'; position: absolute; top: 5px; font-size: 10px; color: #8898aa; letter-spacing: 1px;
        }

        .btn-spin { 
            width: 100%; max-width: 250px; padding: 18px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, #ffaa00 0%, #ff7700 100%); 
            color: #000; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 170, 0, 0.4); border: 2px solid #fff;
        }
        .btn-spin:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(255, 170, 0, 0.4); }
        .btn-disabled { background: #2d4a77; color: #8898aa; cursor: not-allowed; box-shadow: none; border-color: #2d4a77; }

        .rules-box { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed #2d4a77; margin-top: 10px; }
        .rules-box p { color: #8898aa; font-size: 12px; line-height: 1.5; font-weight: bold; text-align: center; }
        .rules-box span { color: #00e6ff; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅ Back</a>
            <h2 class="page-title">Lucky Spin</h2>
            <div class="spin-count">Spins: <span id="spin-display">0</span></div>
        </div>

        <div class="spin-container">
            <div class="digital-spinner" id="prize-box">₹000</div>

            <button class="btn-spin btn-disabled" id="spin-btn" onclick="startSpin()" disabled>LOADING...</button>
        </div>

        <div class="rules-box">
            <p>🎁 You get <span>1 Free Spin</span> upon registration. <br>To get more spins, upgrade your VIP Level or invite friends to join your team. Prizes range from ₹10 to ₹500 directly added to your wallet!</p>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div>
            Home
        </a>
        <a href="job.html" class="nav-item">
            <div class="nav-icon">🚀</div>
            Jobs
        </a>
        <a href="refer.html" class="nav-item">
            <div class="nav-icon">🔗</div>
            Team
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            Profile
        </a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "login.html";

        let totalSpins = 0;
        let userData = null;

        // Possible Prizes (In Rupees)
        const prizes = [10, 25, 50, 100, 500, 20];

        // Fetch User Data and Spin Count
        db.ref('users/' + userPhone).on('value', (snap) => {
            userData = snap.val();
            if(userData) {
                // Calculate total spins available
                totalSpins = 0;
                if(userData.spins) {
                    for(let key in userData.spins) {
                        totalSpins += userData.spins[key];
                    }
                }
                
                document.getElementById('spin-display').innerText = totalSpins;
                checkSpinButton();
            }
        });

        function checkSpinButton() {
            let btn = document.getElementById('spin-btn');
            if(totalSpins > 0) {
                btn.innerText = "SPIN NOW!";
                btn.classList.remove('btn-disabled');
                btn.disabled = false;
            } else {
                btn.innerText = "NO SPINS LEFT";
                btn.classList.add('btn-disabled');
                btn.disabled = true;
            }
        }

        function startSpin() {
            let btn = document.getElementById('spin-btn');
            let prizeBox = document.getElementById('prize-box');
            
            btn.disabled = true;
            btn.innerText = "SPINNING...";
            btn.style.background = "#ff4d4d";

            // Digital Shuffling Effect (Slot Machine Vibe)
            let shuffleCount = 0;
            let shuffleInterval = setInterval(() => {
                let randomTemp = prizes[Math.floor(Math.random() * prizes.length)];
                prizeBox.innerText = "₹" + randomTemp;
                prizeBox.style.color = "#fff";
                shuffleCount++;

                // Stop after 3 seconds (30 shuffles * 100ms)
                if(shuffleCount > 30) {
                    clearInterval(shuffleInterval);
                    finishSpin();
                }
            }, 100);
        }

        function finishSpin() {
            let prizeBox = document.getElementById('prize-box');
            let btn = document.getElementById('spin-btn');

            // Pick a final winning amount
            let finalWin = prizes[Math.floor(Math.random() * prizes.length)];
            prizeBox.innerText = "₹" + finalWin;
            prizeBox.style.color = "#00ff88"; // Neon green for win
            prizeBox.style.transform = "scale(1.2)";
            setTimeout(() => { prizeBox.style.transform = "scale(1)"; }, 300);

            // Deduct 1 spin from database
            let newSpinsData = userData.spins;
            for(let key in newSpinsData) {
                if(newSpinsData[key] > 0) {
                    newSpinsData[key] -= 1; // Kam kar do ek spin
                    break;
                }
            }

            // Update Balance & History in Firebase
            let newBalance = (userData.balance || 0) + finalWin;
            let txnDate = new Date().toLocaleString();

            db.ref('users/' + userPhone).update({
                balance: newBalance,
                spins: newSpinsData
            }).then(() => {
                db.ref('users/' + userPhone + '/transactions').push({
                    type: 'Lucky Spin Reward',
                    amount: finalWin,
                    status: 'Success',
                    date: txnDate
                }).then(() => {
                    setTimeout(() => {
                        alert(`🎉 BINGO! You won ₹${finalWin}!\nAmount has been added to your wallet.`);
                        btn.style.background = "linear-gradient(90deg, #ffaa00 0%, #ff7700 100%)";
                        checkSpinButton();
                    }, 500);
                });
            });
        }
    </script>
</body>
</html>
