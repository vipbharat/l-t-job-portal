<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Wallet - Withdraw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px;
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { background: #152238; border: 1px solid #2d4a77; color: #00e6ff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }

        /* Wallet Display */
        .wallet-card {
            background: linear-gradient(135deg, #152238 0%, #1f365c 100%);
            padding: 30px 20px; border-radius: 15px; border: 1px solid #00e6ff;
            text-align: center; margin-bottom: 25px;
        }
        .balance-label { color: #8898aa; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .balance-amount { color: #00ff88; font-size: 36px; font-weight: 900; }

        /* Withdrawal Form */
        .form-box { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #1f365c; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #cbd5e1; font-size: 14px; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; padding: 15px; background: #090e17; border: 1px solid #2d4a77; 
            border-radius: 8px; color: #fff; font-size: 18px; outline: none;
        }

        /* Withdrawal Schedule Table (Social Proof) */
        .schedule-table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; color: #8898aa; }
        .schedule-table th, .schedule-table td { padding: 10px; border: 1px solid #1f365c; text-align: left; }
        .schedule-table th { background: #152238; color: #00e6ff; }
        .active-row { color: #00ff88; background: rgba(0, 255, 136, 0.05); }

        .btn-withdraw { 
            width: 100%; padding: 16px; border-radius: 8px; border: none; 
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); 
            color: #000; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅ Back</a>
            <h2 style="font-size: 20px; text-transform: uppercase;">Withdraw Money</h2>
        </div>

        <div class="wallet-card">
            <p class="balance-label">Available for Withdrawal</p>
            <p class="balance-amount">₹4,550.00</p>
        </div>

        <div class="form-box">
            <div class="input-group">
                <label>Enter Amount to Withdraw</label>
                <input type="number" id="withdraw-amount" placeholder="Min ₹200">
            </div>

            <div style="margin-bottom: 20px;">
                <p style="color: #ffaa00; font-size: 13px; font-weight: bold; margin-bottom: 10px;">📅 Withdrawal Schedule:</p>
                <table class="schedule-table">
                    <tr><th>VIP Level</th><th>Dates Allowed</th></tr>
                    <tr id="row-G13"><td>G1, G2, G3</td><td>1st - 10th</td></tr>
                    <tr id="row-G46"><td>G4, G5, G6</td><td>11th - 20th</td></tr>
                    <tr id="row-G78"><td>G7, G8</td><td>21st - 28th</td></tr>
                </table>
            </div>

            <button class="btn-withdraw" onclick="checkAndWithdraw()">SUBMIT WITHDRAWAL</button>
        </div>
    </div>

    <script>
        // Assume user is G3 for testing (Yeh Admin Panel se control hoga)
        let currentUserLevel = "G3"; 

        function checkAndWithdraw() {
            let amount = document.getElementById('withdraw-amount').value;
            let today = new Date();
            let date = today.getDate(); // Current Date
            
            let canWithdraw = false;
            let ruleMsg = "";

            // 1. G1-G3 Rule
            if (["G1", "G2", "G3"].includes(currentUserLevel)) {
                if (date >= 1 && date <= 10) canWithdraw = true;
                ruleMsg = "1st to 10th";
            } 
            // 2. G4-G6 Rule
            else if (["G4", "G5", "G6"].includes(currentUserLevel)) {
                if (date >= 11 && date <= 20) canWithdraw = true;
                ruleMsg = "11th to 20th";
            }
            // 3. G7-G8 Rule
            else if (["G7", "G8"].includes(currentUserLevel)) {
                if (date >= 21 && date <= 28) canWithdraw = true;
                ruleMsg = "21st to 28th";
            }

            if (!canWithdraw) {
                alert(`❌ Withdrawal Locked!\n\nAs a ${currentUserLevel} member, you can only withdraw between ${ruleMsg} of every month.\n\nToday's Date: ${date}`);
                return;
            }

            if (amount < 200) {
                alert("Minimum withdrawal amount is ₹200.");
                return;
            }

            // Success Case
            alert(`✅ Request Sent!\nYour withdrawal of ₹${amount} is under review. It will be credited within 24 hours.`);
        }

        // Highlight current active row based on date
        window.onload = function() {
            let d = new Date().getDate();
            if (d >= 1 && d <= 10) document.getElementById('row-G13').classList.add('active-row');
            if (d >= 11 && d <= 20) document.getElementById('row-G46').classList.add('active-row');
            if (d >= 21 && d <= 28) document.getElementById('row-G78').classList.add('active-row');
        }
    </script>
</body>
</html>
