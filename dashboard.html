<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding: 20px; padding-bottom: 80px;
        }

        /* Top Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #007bff, #00e6ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
        .greeting { color: #8898aa; font-size: 12px; }
        .phone { color: #fff; font-weight: bold; font-size: 14px; }
        
        .level-badge { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #152238 0%, #1f365c 100%);
            padding: 25px 20px; border-radius: 16px; border: 1px solid #00e6ff;
            box-shadow: 0 10px 20px rgba(0, 230, 255, 0.1);
            position: relative; overflow: hidden; margin-bottom: 25px;
        }
        .bal-label { color: #8898aa; font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .bal-amount { color: #00ff88; font-size: 36px; font-weight: 900; letter-spacing: 1px; }
        
        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .action-btn { background: #0f172a; border: 1px solid #2d4a77; border-radius: 12px; padding: 15px 5px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; }
        .action-btn:hover { border-color: #00e6ff; background: #152238; transform: translateY(-3px); }
        .action-icon { font-size: 24px; }
        .action-text { color: #cbd5e1; font-size: 12px; font-weight: bold; text-transform: uppercase; }

        /* Banner Slider Placeholder */
        .banner { background: #152238; border: 1px dashed #00e6ff; border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 25px; cursor: pointer; }
        .banner h3 { color: #00e6ff; text-transform: uppercase; font-size: 16px; margin-bottom: 5px;}
        .banner p { color: #8898aa; font-size: 12px; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div style="max-width: 500px; margin: 0 auto;">
        
        <div class="header">
            <div class="user-info">
                <div class="avatar">👤</div>
                <div>
                    <div class="greeting">Welcome Back,</div>
                    <div class="phone" id="user-display">Loading...</div>
                </div>
            </div>
            <div class="level-badge" id="level-display">G1</div>
        </div>

        <div class="balance-card">
            <div class="bal-label">Total Asset Balance</div>
            <div class="bal-amount" id="balance-display">₹0.00</div>
        </div>

        <div class="action-grid">
            <a href="deposit.html" class="action-btn">
                <div class="action-icon">💳</div>
                <div class="action-text">Recharge</div>
            </a>
            <a href="wallet.html" class="action-btn">
                <div class="action-icon">🏦</div>
                <div class="action-text">Withdraw</div>
            </a>
            <a href="refer.html" class="action-btn">
                <div class="action-icon">🔗</div>
                <div class="action-text">Invite</div>
            </a>
            <a href="spin.html" class="action-btn">
                <div class="action-icon">🎡</div>
                <div class="action-text">Spin</div>
            </a>
        </div>

        <div class="banner" onclick="window.location.href='popup.html'">
            <h3>🎁 New VIP Events</h3>
            <p>Click here to view latest announcements & offers!</p>
        </div>

        <a href="job.html" style="display: block; background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); color: #000; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 900; font-size: 16px; text-transform: uppercase;">
            🚀 Enter VIP Job Work Station
        </a>

    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <div class="nav-icon">🏠</div>
            Home
        </a>
        <a href="job.html" class="nav-item">
            <div class="nav-icon">🚀</div>
            Jobs
        </a>
        <a href="refer.html" class="nav-item">
            <div class="nav-icon">🔗</div>
            Team
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            Profile
        </a>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Check if user is logged in
        const userPhone = localStorage.getItem('loggedInUser');
        if (!userPhone) window.location.href = "index.html";

        // Mask phone number (e.g., 98****4321)
        let maskedPhone = userPhone.substring(0, 2) + "******" + userPhone.substring(8, 10);
        document.getElementById('user-display').innerText = "+91 " + maskedPhone;

        // Fetch Live Balance and Level
        db.ref('users/' + userPhone).on('value', (snap) => {
            let userData = snap.val();
            if(userData) {
                document.getElementById('balance-display').innerText = "₹" + (userData.balance || 0).toLocaleString('en-IN');
                document.getElementById('level-display').innerText = userData.level || "G1";
            }
        });
    </script>
</body>
</html>
