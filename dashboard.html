<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Main Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; padding-bottom: 70px;
        }

        /* Top Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(21, 34, 56, 0.9); border-bottom: 1px solid #1f365c; }
        .user-greeting h2 { color: #00e6ff; font-size: 20px; font-weight: 800; }
        .user-greeting p { color: #8898aa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .logout-btn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; }

        /* Stats Container */
        .stats-container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 0 auto; }
        .stat-card { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #2d4a77; text-align: center; }
        .stat-card.main-wallet { grid-column: span 2; background: linear-gradient(135deg, #0f172a 0%, #1a2a44 100%); border-color: #00e6ff; box-shadow: 0 5px 20px rgba(0, 230, 255, 0.1); }
        
        .stat-title { color: #8898aa; font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .stat-value { color: #fff; font-size: 24px; font-weight: 900; }
        .main-wallet .stat-value { color: #00e6ff; font-size: 36px; }

        /* Main Action Area */
        .action-area { padding: 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        
        /* The Big Job Button */
        .big-job-btn {
            display: block; width: 100%; padding: 25px 20px; border-radius: 15px; text-decoration: none;
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; font-weight: 900; font-size: 22px; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 230, 255, 0.3); transition: 0.3s;
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .big-job-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 230, 255, 0.5); }
        .big-job-btn p { font-size: 12px; color: #111; margin-top: 5px; font-weight: bold; }

        /* Quick Action Buttons */
        .quick-actions { display: flex; gap: 15px; }
        .quick-btn {
            flex: 1; padding: 15px; border-radius: 10px; text-align: center; text-decoration: none;
            background: #152238; border: 1px solid #2d4a77; color: #cbd5e1; font-weight: bold; transition: 0.3s;
        }
        .quick-btn:hover { background: rgba(0, 230, 255, 0.1); border-color: #00e6ff; color: #00e6ff; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #152238; border-top: 1px solid #1f365c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #8898aa; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #00e6ff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-greeting">
            <p>Welcome back,</p>
            <h2>LNT Member</h2>
        </div>
        <a href="index.html" class="logout-btn">LOGOUT</a>
    </div>

    <div class="stats-container">
        <div class="stat-card main-wallet">
            <div class="stat-title">Total Balance</div>
            <div class="stat-value" id="dash-balance">₹0.00</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-title">Total Earning</div>
            <div class="stat-value" style="color: #00ff88;">₹0.00</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Active Jobs</div>
            <div class="stat-value" style="color: #ffaa00;">0</div>
        </div>
    </div>

    <div class="action-area">
        
        <a href="job.html" class="big-job-btn">
            EXPLORE VIP JOBS
            <p>Unlock G1 to G8 Levels & Start Earning</p>
        </a>

        <div class="quick-actions">
            <a href="wallet.html" class="quick-btn">📥 Deposit</a>
            <a href="wallet.html" class="quick-btn">📤 Withdraw</a>
        </div>
        
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">🏠 Home</a>
        <a href="job.html" class="nav-item">🚀 Jobs</a>
        <a href="wallet.html" class="nav-item">💼 Wallet</a>
        <a href="profile.html" class="nav-item">👤 Profile</a>
    </div>

</body>
</html>
