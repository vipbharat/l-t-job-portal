<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Professional Login</title>
    <style>
        /* Tech-focused Corporate Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            color: #fff;
        }

        .login-card { 
            background: #152238; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #1f365c; 
            width: 380px; 
            box-shadow: 0 15px 35px rgba(0, 200, 255, 0.1);
        }

        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { color: #00e6ff; font-size: 34px; letter-spacing: 2px; font-weight: 800; }
        .brand p { color: #8898aa; font-size: 13px; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #a0aec0; font-size: 13px; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #2d4a77;
            background: #0f172a; color: #fff; font-size: 15px; outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus { border-color: #00e6ff; box-shadow: 0 0 10px rgba(0, 230, 255, 0.2); }

        .btn {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; margin-top: 10px;
        }
        .btn:hover { box-shadow: 0 5px 15px rgba(0, 230, 255, 0.4); transform: translateY(-2px); }

        /* Simulated OTP Box */
        #otp-section { display: none; margin-top: 20px; border-top: 1px solid #2d4a77; padding-top: 20px; }
        .system-otp-display { 
            background: rgba(0, 230, 255, 0.1); border: 1px dashed #00e6ff; 
            color: #00e6ff; padding: 10px; border-radius: 8px; text-align: center; 
            margin-bottom: 15px; font-weight: bold; font-size: 18px; letter-spacing: 3px;
        }

        .alert-msg { color: #ff4d4d; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">
            <h1>LNT JOB</h1>
            <p>Secure Tech Portal</p>
        </div>

        <div id="login-section">
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10">
            </div>
            <div class="input-group">
                <label>Create / Enter Password</label>
                <input type="password" id="password" placeholder="Secure Password">
            </div>

            <button class="btn" onclick="generateSystemOTP()">Generate OTP</button>
            <p class="alert-msg" id="error-msg">Please enter valid details.</p>
        </div>

        <div id="otp-section">
            <div class="system-otp-display" id="display-otp">------</div>
            <p style="text-align: center; color: #8898aa; font-size: 12px; margin-bottom: 15px;">System Generated OTP (No SMS Cost)</p>
            
            <div class="input-group">
                <input type="number" id="otp-input" placeholder="Enter the OTP shown above">
            </div>
            <button class="btn" onclick="verifyLogin()">Secure Login</button>
        </div>
    </div>

    <script>
        let currentGeneratedOTP = "";

        function generateSystemOTP() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Basic Validation
            if(phone.length < 10 || password.length < 4) {
                errorMsg.style.display = "block";
                return;
            }
            errorMsg.style.display = "none";

            // Generate a random 6-digit OTP
            currentGeneratedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Show OTP on screen (Simulating SMS)
            document.getElementById('display-otp').innerText = currentGeneratedOTP;
            
            // Hide some fields and show OTP section
            document.getElementById('password').disabled = true;
            document.getElementById('phone').disabled = true;
            document.getElementById('otp-section').style.display = "block";
        }

        function verifyLogin() {
            const enteredOTP = document.getElementById('otp-input').value;

            if(enteredOTP === currentGeneratedOTP) {
                alert("Login Successful! Welcome to LNT Job Portal.");
                // Yahan aap next page par bhej sakte hain
                // window.location.href = "dashboard.html"; 
            } else {
                alert("Incorrect OTP. Please try again.");
            }
        }
    </script>
</body>
</html>
