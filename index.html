<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&T Job Portal - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            background: #050914; 
            background-image: linear-gradient(135deg, #050914 0%, #111b2b 100%);
            min-height: 100vh; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .auth-card {
            background: #0f172a; width: 100%; max-width: 400px;
            padding: 30px 20px; border-radius: 16px; border: 1px solid #1f365c;
            box-shadow: 0 10px 30px rgba(0, 230, 255, 0.1); text-align: center;
        }

        .logo-box { font-size: 50px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 230, 255, 0.5); }
        .app-title { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .app-sub { color: #8898aa; font-size: 13px; font-weight: bold; margin-bottom: 25px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: 1px solid #2d4a77; color: #8898aa; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: rgba(0, 230, 255, 0.1); color: #00e6ff; border-color: #00e6ff; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group input { width: 100%; padding: 14px; background: #050914; border: 1px solid #2d4a77; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: #00e6ff; }

        .btn-submit { width: 100%; padding: 16px; border-radius: 8px; border: none; background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); color: #000; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-submit:active { transform: scale(0.98); }

        #status-msg { font-size: 13px; margin-bottom: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">🏢</div>
        <div class="app-title">L&T Job Portal</div>
        <div class="app-sub">Welcome to the future of digital earnings</div>

        <div id="status-msg"></div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchForm('login')">LOGIN</button>
            <button class="tab-btn" id="tab-register" onclick="switchForm('register')">REGISTER</button>
        </div>

        <div id="login-form">
            <div class="input-group">
                <input type="number" id="log-phone" placeholder="Phone Number (10 digits)">
            </div>
            <div class="input-group">
                <input type="password" id="log-pass" placeholder="Login Password">
            </div>
            <button class="btn-submit" onclick="loginUser()">LOGIN NOW</button>
        </div>

        <div id="register-form" style="display: none;">
            <div class="input-group">
                <input type="number" id="reg-phone" placeholder="Mobile Number">
            </div>
            <div class="input-group">
                <input type="password" id="reg-pass" placeholder="Create Password">
            </div>
            <div class="input-group">
                <input type="text" id="reg-invite" placeholder="Invite Code (Optional)">
            </div>
            <button class="btn-submit" onclick="registerUser()">CREATE ACCOUNT</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Agar pehle se login hai, direct dashboard pe bhejo
        if (localStorage.getItem('loggedInUser')) {
            window.location.href = "dashboard.html";
        }

        function switchForm(type) {
            document.getElementById('status-msg').style.display = 'none';
            if (type === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('tab-register').classList.add('active');
            }
        }

        function showMsg(type, text) {
            let box = document.getElementById('status-msg');
            box.style.display = 'block';
            if (type === 'error') {
                box.style.background = 'rgba(255, 77, 77, 0.1)'; box.style.color = '#ff4d4d'; box.innerText = "❌ " + text;
            } else {
                box.style.background = 'rgba(0, 255, 136, 0.1)'; box.style.color = '#00ff88'; box.innerText = "✅ " + text;
            }
        }

        function registerUser() {
            let phone = document.getElementById('reg-phone').value.trim();
            let pass = document.getElementById('reg-pass').value.trim();

            if (phone.length !== 10) return showMsg('error', 'Enter valid 10-digit phone number.');
            if (pass.length < 4) return showMsg('error', 'Password must be at least 4 characters.');

            // Check if user exists
            db.ref('users/' + phone).once('value').then(snap => {
                if (snap.exists()) {
                    showMsg('error', 'Account already exists! Please Login.');
                } else {
                    // Create new user with Default Values
                    db.ref('users/' + phone).set({
                        password: pass,
                        balance: 0,
                        level: "G1",
                        spins: { welcomeSpin: 1 }, // 1 Free Spin
                        joinDate: new Date().toLocaleDateString()
                    }).then(() => {
                        showMsg('success', 'Account created! Logging in...');
                        setTimeout(() => {
                            localStorage.setItem('loggedInUser', phone);
                            window.location.href = "dashboard.html";
                        }, 1500);
                    });
                }
            });
        }

        function loginUser() {
            let phone = document.getElementById('log-phone').value.trim();
            let pass = document.getElementById('log-pass').value.trim();

            if (phone.length !== 10) return showMsg('error', 'Enter valid 10-digit number.');

            db.ref('users/' + phone).once('value').then(snap => {
                if (snap.exists() && snap.val().password === pass) {
                    showMsg('success', 'Login Successful!');
                    localStorage.setItem('loggedInUser', phone);
                    setTimeout(() => window.location.href = "dashboard.html", 1000);
                } else {
                    showMsg('error', 'Incorrect Phone Number or Password!');
                }
            }).catch(() => showMsg('error', 'Network Error!'));
        }
    </script>
</body>
</html>
