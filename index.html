<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT Job - Create Account</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff;
        }

        .auth-card {
            width: 90%; max-width: 400px; background: #152238; padding: 30px;
            border-radius: 20px; border: 1px solid #00e6ff; box-shadow: 0 0 30px rgba(0, 230, 255, 0.1);
            text-align: center;
        }

        .logo-text { color: #00e6ff; font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        .sub-text { color: #8898aa; font-size: 14px; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2d4a77; 
            background: #090e17; color: #fff; outline: none; font-size: 16px;
        }
        .input-group input:focus { border-color: #00e6ff; box-shadow: 0 0 10px rgba(0, 230, 255, 0.2); }

        .btn-reg { 
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%);
            color: #000; font-weight: 900; font-size: 18px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn-reg:active { transform: scale(0.98); }

        .footer-links { margin-top: 25px; font-size: 14px; color: #8898aa; }
        .footer-links a { color: #00e6ff; text-decoration: none; font-weight: bold; }

        /* Bonus Badge */
        .bonus-tag { 
            background: rgba(0, 255, 136, 0.1); color: #00ff88; 
            padding: 5px 15px; border-radius: 20px; font-size: 12px; 
            font-weight: bold; display: inline-block; margin-bottom: 20px;
            border: 1px solid #00ff88;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-text">LNT JOB</div>
        <div class="bonus-tag">🎁 GET ₹50 SIGNUP BONUS</div>
        <p class="sub-text">Sunhara mauka loss recover karne ka!</p>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="number" id="reg-phone" placeholder="Enter 10 digit number">
        </div>

        <div class="input-group">
            <label>Create Password</label>
            <input type="password" id="reg-pass" placeholder="Enter strong password">
        </div>

        <div class="input-group">
            <label>Invite Code (Optional)</label>
            <input type="text" id="reg-invite" placeholder="e.g. LNT1234">
        </div>

        <button class="btn-reg" id="reg-btn" onclick="handleRegister()">Register Now</button>

        <div class="footer-links">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleRegister() {
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            const invite = document.getElementById('reg-invite').value;
            const btn = document.getElementById('reg-btn');

            if (phone.length < 10) { alert("Please enter a valid 10-digit number!"); return; }
            if (pass.length < 4) { alert("Password must be at least 4 characters!"); return; }

            btn.disabled = true;
            btn.innerText = "Creating Account...";

            // Check if user already exists
            db.ref('users/' + phone).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    alert("This number is already registered! Please Login.");
                    btn.disabled = false;
                    btn.innerText = "Register Now";
                } else {
                    // Create New User with ₹50 Bonus
                    const userData = {
                        phone: phone,
                        password: pass,
                        balance: 50, // Welcome Bonus
                        level: "G1",
                        inviteCode: invite || "NONE",
                        joinDate: new Date().toLocaleString(),
                        spins: { "G1": 0, "G2": 0, "G3": 0 }
                    };

                    db.ref('users/' + phone).set(userData).then(() => {
                        // Add Bonus to Transaction History
                        db.ref('users/' + phone + '/transactions').push({
                            type: "Welcome Bonus",
                            amount: 50,
                            status: "Success",
                            date: new Date().toLocaleString()
                        }).then(() => {
                            alert("Congratulations! 🎉\nAccount created successfully. ₹50 Bonus added to your wallet.");
                            localStorage.setItem('loggedInUser', phone);
                            window.location.href = "announcement.html"; // Pehle popup dikhao fir dashboard
                        });
                    });
                }
            });
        }
    </script>
</body>
</html>
