<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNT VIP Portal - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #090e17; 
            background-image: linear-gradient(135deg, #090e17 0%, #111b2b 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; padding: 20px;
        }

        .auth-box {
            background: #152238; width: 100%; max-width: 400px;
            padding: 40px 25px; border-radius: 16px;
            border: 1px solid #1f365c;
            box-shadow: 0 10px 30px rgba(0, 230, 255, 0.1);
            text-align: center;
        }

        .logo-text { color: #00e6ff; font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .sub-text { color: #8898aa; font-size: 14px; margin-bottom: 30px; font-weight: bold; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 14px; background: #090e17; border: 1px solid #2d4a77; 
            border-radius: 8px; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #00e6ff; box-shadow: 0 0 10px rgba(0, 230, 255, 0.2); }

        .btn-auth { 
            width: 100%; padding: 15px; border-radius: 8px; border: none; 
            background: linear-gradient(90deg, #007bff 0%, #00e6ff 100%); 
            color: #000; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn-auth:active { transform: scale(0.98); }

        .toggle-text { margin-top: 20px; color: #8898aa; font-size: 14px; }
        .toggle-text span { color: #00ff88; font-weight: bold; cursor: pointer; text-decoration: underline; }
        
        #error-msg { color: #ff4d4d; font-size: 13px; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h1 class="logo-text">LNT PORTAL</h1>
        <p class="sub-text" id="form-subtitle">Login to your VIP account</p>

        <p id="error-msg">Error message goes here</p>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="number" id="phone" placeholder="Enter 10 digit number">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="btn-auth" id="auth-btn" onclick="handleAuth()">LOGIN NOW</button>

        <p class="toggle-text" id="toggle-hint">Don't have an account? <span onclick="toggleMode()">Register Here</span></p>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD5N1owkFBQDT7kP8Vd4bU9LqmLfZmprKM",
            databaseURL: "https://lnt-job-portal-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Agar user pehle se login hai, toh seedha andar bhej do
        if(localStorage.getItem('loggedInUser')) {
            window.location.href = "dashboard.html";
        }

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('phone').value = "";
            document.getElementById('password').value = "";

            if(isLoginMode) {
                document.getElementById('form-subtitle').innerText = "Login to your VIP account";
                document.getElementById('auth-btn').innerText = "LOGIN NOW";
                document.getElementById('toggle-hint').innerHTML = 'Don\'t have an account? <span onclick="toggleMode()">Register Here</span>';
            } else {
                document.getElementById('form-subtitle').innerText = "Create a new VIP account";
                document.getElementById('auth-btn').innerText = "REGISTER NOW";
                document.getElementById('toggle-hint').innerHTML = 'Already have an account? <span onclick="toggleMode()">Login Here</span>';
            }
        }

        function showError(msg) {
            let errBox = document.getElementById('error-msg');
            errBox.innerText = "❌ " + msg;
            errBox.style.display = 'block';
        }

        function handleAuth() {
            let phone = document.getElementById('phone').value.trim();
            let pass = document.getElementById('password').value.trim();
            let btn = document.getElementById('auth-btn');

            if(phone.length !== 10) {
                showError("Please enter a valid 10-digit phone number.");
                return;
            }
            if(pass.length < 4) {
                showError("Password must be at least 4 characters long.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PLEASE WAIT...";
            document.getElementById('error-msg').style.display = 'none';

            let userRef = db.ref('users/' + phone);

            if(isLoginMode) {
                // --- LOGIN LOGIC ---
                userRef.once('value').then((snap) => {
                    let userData = snap.val();
                    if(userData && userData.password === pass) {
                        // Login Success
                        localStorage.setItem('loggedInUser', phone);
                        window.location.href = "dashboard.html"; // Seedha dashboard par bhej do
                    } else {
                        showError("Incorrect phone number or password!");
                        btn.disabled = false;
                        btn.innerText = "LOGIN NOW";
                    }
                }).catch((error) => {
                    showError("Network error. Try again.");
                    btn.disabled = false;
                    btn.innerText = "LOGIN NOW";
                });

            } else {
                // --- REGISTER LOGIC ---
                userRef.once('value').then((snap) => {
                    if(snap.exists()) {
                        showError("This number is already registered! Please login.");
                        btn.disabled = false;
                        btn.innerText = "REGISTER NOW";
                    } else {
                        // Create New User (Sath me 1 Free Spin Bonus!)
                        userRef.set({
                            password: pass,
                            balance: 0,
                            level: "G1",
                            teamSize: 0,
                            spins: { "G1": 1 }, // Welcome Bonus
                            joinDate: new Date().toLocaleString()
                        }).then(() => {
                            alert("✅ Account Created Successfully!\nYou got 1 FREE Spin as Welcome Bonus!");
                            localStorage.setItem('loggedInUser', phone);
                            window.location.href = "dashboard.html";
                        });
                    }
                });
            }
        }
    </script>
</body>
</html>
